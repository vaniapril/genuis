name: genuis
description: Code generation for theme classes based on files from the assets folder and its structure.
version: 0.2.1
repository: https://github.com/vaniapril/genuis
issue_tracker: https://github.com/vaniapril/genuis/issues

environment:
  sdk: ^3.8.0

dependencies:
  build: ">=3.0.0 <5.0.0"
  source_gen: ">=3.0.0 <5.0.0"
  yaml: ">=3.1.3 <4.0.0"
  path: ">=1.9.1 <2.0.0"
  xml: ">=6.6.1 <7.0.0"
  dart_style: ">=3.1.0 <4.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <7.0.0"

platforms:
  linux:
  windows:
  macos:

topics:
  - theme
  - theme-extension
  - assets
  - codegen
  - build-runner
