base_theme: base_theme

tokens:
  - colors:
      type: color
      class_name: ColorsPalette
  - numbers:
      type: number
  - strings:
      type: string
  - icons_tokens:
      path: icons/

modules:
  - blurs:
      type: blur
  - colors:
      type: color
  - colors_file:
      type: color
      path: colors_file.json
  - fonts:
      type: font
  - fonts_colored:
      type: font
      path: fonts/
      color: true
  - gradients:
      type: gradient
  - icons:
      type: asset
  - icons_colored:
      type: asset
      path: icons/
      color: true
  - images:
      type: asset
  - images_colored:
      type: asset
      path: images/
      color: true
  - shadows:
      type: shadow
  - shadows_colored:
      type: shadow
      path: shadows/
      color: true
